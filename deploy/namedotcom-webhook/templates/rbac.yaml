apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
---
# Allow the webhook to read the kube-system:extension-apiserver-authentication ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:webhook-authentication-reader
  namespace: kube-system
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "namedotcom-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Allow the webhook to delegate authentication decisions to the kube API server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:auth-delegator
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "namedotcom-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Allow cert-manager to create challenges using this solver's API group
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:domain-solver
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
rules:
  - apiGroups:
      - {{ .Values.groupName }}
    resources:
      - "*"
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:domain-solver
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "namedotcom-webhook.fullname" . }}:domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Values.certManager.namespace }}
---
# Allow the webhook to read Secrets in the cert-manager namespace (for name.com credentials)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:secret-reader
  namespace: {{ .Values.certManager.namespace }}
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "namedotcom-webhook.fullname" . }}:secret-reader
  namespace: {{ .Values.certManager.namespace }}
  labels:
    app: {{ include "namedotcom-webhook.name" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "namedotcom-webhook.fullname" . }}:secret-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "namedotcom-webhook.fullname" . }}
    namespace: {{ .Release.Namespace }}
